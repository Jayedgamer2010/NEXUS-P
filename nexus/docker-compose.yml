# ================================================================
# NEXUS Dashboard - Docker Compose (MySQL-backed)
# ================================================================
# This compose file runs the PHP backend + Vue frontend with MySQL.
# ================================================================
# Usage:
#   1. Configure DATABASE_* variables in .env
#   2. docker compose up -d --build
# ================================================================

services:
  # ---- MySQL Database (MariaDB) ----
  mysql:
    image: mariadb:11.4
    container_name: nexus_mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-nexus_root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-mythicaldash}
      MARIADB_USER: ${MARIADB_USER:-nexus}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-nexus_password}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/storage/migrations:/docker-entrypoint-initdb.d
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-nexus_root_password}"]
      timeout: 20s
      retries: 10

  # ---- Redis (caching / sessions / rate limiting) ----
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-nexus_redis_password}
    volumes:
      - redis_data:/data
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  # ---- PHP Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    restart: unless-stopped
    environment:
      # MySQL Database
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_DATABASE=${MARIADB_DATABASE:-mythicaldash}
      - DATABASE_USER=${MARIADB_USER:-nexus}
      - DATABASE_PASSWORD=${MARIADB_PASSWORD:-nexus_password}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexus_redis_password}
      # Pterodactyl
      - PTERODACTYL_URL=${PTERODACTYL_URL}
      - PTERODACTYL_API_KEY=${PTERODACTYL_API_KEY}
      # Application
      - APP_ENV=production
      - APP_URL=${APP_URL:-localhost}
      - APP_NAME=${APP_NAME:-NEXUS}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "cli", "help"]
      timeout: 20s
      retries: 10
    volumes:
      - ./backend/storage/.env:/var/www/html/storage/.env
      - nexus_attachments:/var/www/html/public/attachments
      - nexus_backups:/var/www/html/storage/backups
      - nexus_logs:/var/www/html/storage/logs
    networks:
      - nexus_network

  # ---- Vue Frontend (Nginx SPA) ----
  frontend:
    image: nginx:alpine
    container_name: nexus_frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nexus_attachments:
    driver: local
  nexus_backups:
    driver: local
  nexus_logs:
    driver: local

networks:
  nexus_network:
    driver: bridge
