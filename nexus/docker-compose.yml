# ================================================================
# NEXUS Dashboard - Docker Compose (Supabase-backed)
# ================================================================
# This compose file runs the PHP backend + Vue frontend.
# Database is Supabase (cloud PostgreSQL + Auth).
# MySQL has been REMOVED because Supabase IS your database.
# ================================================================
# Usage:
#   1. Set SUPABASE_URL and SUPABASE_SERVICE_KEY in .env
#   2. docker compose up -d --build
# ================================================================

services:
  # ---- Redis (caching / sessions / rate limiting) ----
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-nexus_redis_password}
    volumes:
      - redis_data:/data
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  # ---- PHP Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    restart: unless-stopped
    environment:
      # Supabase (REQUIRED)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexus_redis_password}
      # Pterodactyl
      - PTERODACTYL_URL=${PTERODACTYL_URL}
      - PTERODACTYL_API_KEY=${PTERODACTYL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/storage/.env:/var/www/html/storage/.env
      - nexus_attachments:/var/www/html/public/attachments
      - nexus_backups:/var/www/html/storage/backups
      - nexus_logs:/var/www/html/storage/logs
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "php", "cli", "help"]
      timeout: 20s
      retries: 10

  # ---- Vue Frontend (Nginx SPA) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus_frontend
    restart: unless-stopped
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_PTERODACTYL_URL=${PTERODACTYL_URL}
      - VITE_APP_NAME=${APP_NAME:-NEXUS}
    depends_on:
      backend:
        condition: service_healthy
    volumes: []
    networks:
      - nexus_network
    ports:
      - "4832:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      timeout: 20s
      retries: 10

volumes:
  redis_data:
    driver: local
  nexus_attachments:
    driver: local
  nexus_backups:
    driver: local
  nexus_logs:
    driver: local

networks:
  nexus_network:
    driver: bridge
